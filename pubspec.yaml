name: financas_app
description: App de gerenciamento de finanças pessoais para o dia a dia (Android e PC).
publish_to: "none"
version: 1.2.0+4

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Estado
  provider: ^6.1.2

  # Preferências do app (tema, privacidade etc.)
  shared_preferences: ^2.3.2

  # Banco de dados local (SQLite)
  sqflite: ^2.3.3            # Android / iOS
  sqflite_common_ffi: ^2.3.3 # Windows / Linux / macOS (desktop)
  path: ^1.9.0
  path_provider: ^2.1.3

  # Formatação de moeda/datas e gráficos
  intl: ^0.20.2
  fl_chart: ^0.68.0

  # Exportar/compartilhar, foto do recibo e hash do PIN
  share_plus: ^10.0.0
  image_picker: ^1.1.2
  crypto: ^3.0.3

  # Atualização do app (checa releases do GitHub e instala o novo APK)
  http: ^1.2.0
  package_info_plus: ^8.0.0
  open_filex: ^4.4.0

  # Importar gastos pelas notificações do banco (Android)
  notification_listener_service: ^0.3.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
